version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tmt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB:       ${POSTGRES_DB:-tmt_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Tmt-server-go
      dockerfile: Dockerfile
    container_name: tmt_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:     production
      PORT:         5000
      DB_USER:      ${POSTGRES_USER:-postgres}
      DB_PASSWORD:  ${POSTGRES_PASSWORD:-password}
      DB_NAME:      ${POSTGRES_DB:-tmt_db}
      DB_HOST:      db
      DB_PORT:      5432
      JWT_SECRET:   ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Tmt-web
      dockerfile: Dockerfile
    container_name: tmt_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
    ports:
      - '3000:3000'

volumes:
  postgres_data:
